framework:
  messenger:
    # Dead-letter queue (DLQ) for non-recoverable messages.
    failure_transport: failed
    transports:
      async:
        dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
        options:
          queue_name: async
          prefetch_count: 1
        retry_strategy:
          # Keep retry settings explicit for predictable retry-rate alerting.
          max_retries: 3
          delay: 1000
          multiplier: 2
          max_delay: 60000
      failed:
        dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
        options:
          # DLQ queue size is used as `dead-letter size` metric in operations runbook.
          queue_name: failed
    routing:
      App\Message\RunInstanceActionMessage: async
      App\Message\SendTemplateMailMessage: async
      App\Module\HostingPanel\Application\Job\DispatchJobMessage: async
      App\Message\MailControlPlaneJobMessage: async
