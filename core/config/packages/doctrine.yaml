doctrine:
  dbal:
    # Runtime DB credentials are loaded from encrypted db config (DbConfigProvider)
    # via DynamicConnectionFactory. Do not depend on DATABASE_URL from .env here.
    driver: 'pdo_mysql'
    host: '127.0.0.1'
    port: 3306
    dbname: 'easywi'
    user: 'easywi'
    password: ''
    charset: 'utf8mb4'
    default_table_options:
      charset: 'utf8mb4'
      collate: 'utf8mb4_unicode_ci'
  orm:
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    auto_mapping: true
    mappings:
      AppModule:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Module'
        prefix: 'App\Module'
        alias: Module
