doctrine:
  dbal:
    # Keep DATABASE_URL as a plain env var so percent-encoded credentials
    # (for example passwords containing "%") are not interpreted as
    # container parameters during cache warmup.
    url: '%env(DATABASE_URL)%'
    charset: 'utf8mb4'
    default_table_options:
      charset: 'utf8mb4'
      collate: 'utf8mb4_unicode_ci'
  orm:
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    auto_mapping: true
    mappings:
      AppModule:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Module'
        prefix: 'App\Module'
        alias: Module
