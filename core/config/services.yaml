parameters:
  app.agent_signature_skew_seconds: '%env(int:AGENT_SIGNATURE_SKEW_SECONDS)%'
  app.agent_nonce_ttl_seconds: '%env(int:AGENT_NONCE_TTL_SECONDS)%'
  app.agent_jwt_issuer_default: 'easywi-panel'
  app.agent_jwt_issuer: '%env(default:app.agent_jwt_issuer_default:APP_AGENT_JWT_ISSUER)%'
  app.agent_jwt_audience_default: 'easywi-agent-api'
  app.agent_jwt_audience: '%env(default:app.agent_jwt_audience_default:APP_AGENT_JWT_AUDIENCE)%'
  app.agent_jwt_max_ttl_seconds_default: '60'
  app.agent_jwt_max_ttl_seconds: '%env(int:default:app.agent_jwt_max_ttl_seconds_default:APP_AGENT_JWT_MAX_TTL_SECONDS)%'
  app.agent_file_timeout_seconds_default: '10'
  app.agent_file_timeout_seconds: '%env(int:default:app.agent_file_timeout_seconds_default:APP_AGENT_FILE_TIMEOUT_SECONDS)%'
  app.agent_release_channel_default: 'stable'
  app.agent_release_repository: '%env(default::APP_AGENT_RELEASE_REPOSITORY)%'
  app.agent_release_channel: '%env(default:app.agent_release_channel_default:APP_AGENT_RELEASE_CHANNEL)%'
  app.changelog_repository: '%env(default::APP_CHANGELOG_REPOSITORY)%'
  app.core_release_channel_default: 'beta'
  app.core_release_repository: '%env(default::APP_CORE_RELEASE_REPOSITORY)%'
  app.core_release_channel: '%env(default:app.core_release_channel_default:APP_CORE_RELEASE_CHANNEL)%'
  app.core_version: '%env(default::APP_CORE_VERSION)%'
  app.core_update_repository: '%env(default:app.core_release_repository:APP_CORE_UPDATE_REPOSITORY)%'
  app.core_update_workflow: '%env(default::APP_CORE_UPDATE_WORKFLOW)%'
  app.core_update_token: '%env(default::APP_GITHUB_TOKEN)%'
  app.core_update_install_dir: '%env(default::APP_CORE_UPDATE_INSTALL_DIR)%'
  app.core_update_manifest_url: '%env(default::APP_CORE_UPDATE_MANIFEST_URL)%'
  app.core_update_releases_dir: '%env(APP_CORE_UPDATE_RELEASES_DIR)%'
  app.core_update_current_symlink: '%env(APP_CORE_UPDATE_CURRENT_SYMLINK)%'
  app.core_update_lock_file: '%env(APP_CORE_UPDATE_LOCK_FILE)%'
  app.core_update_excludes_default: '.env,config/local*,var/,storage/,uploads/'
  app.core_update_excludes: '%env(default:app.core_update_excludes_default:APP_CORE_UPDATE_EXCLUDES)%'
  app.core_update_jobs_dir_default: '%kernel.project_dir%/srv/update/jobs'
  app.core_update_logs_dir_default: '%kernel.project_dir%/srv/update/logs'
  app.core_update_backups_dir_default: '%kernel.project_dir%/srv/update/backups'
  app.core_update_jobs_dir: '%env(default:app.core_update_jobs_dir_default:APP_CORE_UPDATE_JOBS_DIR)%'
  app.core_update_logs_dir: '%env(default:app.core_update_logs_dir_default:APP_CORE_UPDATE_LOGS_DIR)%'
  app.core_update_backups_dir: '%env(default:app.core_update_backups_dir_default:APP_CORE_UPDATE_BACKUPS_DIR)%'
  app.core_update_runner_command_default: '/usr/local/bin/easywi-core-runner'
  app.core_update_runner_command: '%env(default:app.core_update_runner_command_default:APP_CORE_UPDATE_RUNNER)%'
  app.core_update_package_url: '%env(default::APP_CORE_UPDATE_PACKAGE_URL)%'
  app.recovery_allowed_ips_default: '127.0.0.1,::1'
  app.recovery_allowed_ips: '%env(csv:default:app.recovery_allowed_ips_default:APP_RECOVERY_ALLOWED_IPS)%'
  app.windows_nodes_enabled_default: '0'
  app.windows_nodes_enabled: '%env(bool:default:app.windows_nodes_enabled_default:APP_WINDOWS_NODES_ENABLED)%'
  app.payment_dummy_enabled_default: '0'
  app.payment_dummy_enabled: '%env(bool:default:app.payment_dummy_enabled_default:APP_PAYMENT_DUMMY_ENABLED)%'
  app.stripe_secret_key_default: ''
  app.stripe_webhook_secret_default: ''
  app.stripe_success_url_default: '/billing'
  app.stripe_cancel_url_default: '/billing'
  app.admin_authorized_keys_path_default: '/home/easywi/.ssh/authorized_keys'
  app.admin_authorized_keys_path: '%env(default:app.admin_authorized_keys_path_default:APP_ADMIN_AUTHORIZED_KEYS_PATH)%'
  app.sinusbot_quota_min_default: '1'
  app.sinusbot_quota_min: '%env(int:default:app.sinusbot_quota_min_default:APP_SINUSBOT_QUOTA_MIN)%'
  app.sinusbot_quota_max_default: '100'
  app.sinusbot_quota_max: '%env(int:default:app.sinusbot_quota_max_default:APP_SINUSBOT_QUOTA_MAX)%'
  app.agent_service_port_default: '7456'
  app.agent_service_port: '%env(int:default:app.agent_service_port_default:APP_AGENT_SERVICE_PORT)%'
  app.status_agent_shared_secret_default: ''
  app.status_agent_shared_secret: '%env(default:app.status_agent_shared_secret_default:APP_STATUS_AGENT_SHARED_SECRET)%'
  app.status_agent_signature_skew_seconds_default: '120'
  app.status_agent_signature_skew_seconds: >-
    %env(int:default:app.status_agent_signature_skew_seconds_default:APP_STATUS_AGENT_SIGNATURE_SKEW_SECONDS)%
  app.status_stale_grace_seconds_default: '20'
  app.status_stale_grace_seconds: >-
    %env(int:default:app.status_stale_grace_seconds_default:APP_STATUS_STALE_GRACE_SECONDS)%
  app.hosting_panel_secret_key_default: ''
  app.identifier_hash_pepper_default: 'change_this_identifier_pepper'
  app.hosting_panel_secret_key: '%env(default:app.hosting_panel_secret_key_default:APP_HOSTING_PANEL_SECRET_KEY)%'
  app.identifier_hash_pepper: '%env(default:app.identifier_hash_pepper_default:AUTH_IDENTIFIER_HASH_PEPPER)%'
  app.mail_password_hash_algorithm_default: 'argon2id'
  app.mail_password_hash_algorithm: '%env(default:app.mail_password_hash_algorithm_default:APP_MAIL_PASSWORD_HASH_ALGORITHM)%'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      string $projectDir: '%kernel.project_dir%'

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Kernel.php'

  App\Module\Core\Application\EncryptionService:
    factory: ['@App\Infrastructure\Security\EncryptionServiceFactory', 'create']

  App\Infrastructure\Database\DynamicConnectionFactory:
    decorates: doctrine.dbal.connection_factory
    arguments:
      $inner: '@App\Infrastructure\Database\DynamicConnectionFactory.inner'
      $configProvider: '@App\Infrastructure\Config\DbConfigProvider'

  Symfony\Component\Mailer\MailerInterface: '@App\Module\Core\Application\NullMailer'

  App\Module\Core\Application\SecretsCrypto:
    arguments:
      $appSecret: '%env(APP_SECRET)%'
      $fallbackSecrets: '%env(default::APP_SECRET_FALLBACKS)%'

  App\Module\Core\Application\AgentSignatureVerifier:
    arguments:
      $maxSkewSeconds: '%app.agent_signature_skew_seconds%'
      $nonceTtlSeconds: '%app.agent_nonce_ttl_seconds%'

  App\Module\Core\Application\AgentJwtVerifier:
    arguments:
      $issuer: '%app.agent_jwt_issuer%'
      $audience: '%app.agent_jwt_audience%'
      $maxTtlSeconds: '%app.agent_jwt_max_ttl_seconds%'
      $clockSkewSeconds: '%app.agent_signature_skew_seconds%'

  App\Module\Core\Application\AgentCreator:
    arguments:
      $defaultServicePort: '%app.agent_service_port%'

  App\Module\Core\Application\AgentEndpointResolver:
    arguments:
      $defaultServicePort: '%app.agent_service_port%'
      $defaultServiceScheme: 'http'

  App\Module\Core\Application\FileServiceClient:
    arguments:
      $timeoutSeconds: '%app.agent_file_timeout_seconds%'
      $defaultServicePort: '%app.agent_service_port%'
      $defaultServiceScheme: 'http'
      $logger: '@logger'
      $requestStack: '@request_stack'
      $gameServerPathResolver: '@App\Module\Gameserver\Application\GameServerPathResolver'

  App\Module\Core\Application\WebspaceFileServiceClient:
    arguments:
      $timeoutSeconds: '%app.agent_file_timeout_seconds%'
      $defaultServicePort: '%app.agent_service_port%'
      $defaultServiceScheme: 'http'
      $logger: '@logger'
      $requestStack: '@request_stack'

  App\Module\Core\Application\Sinusbot\SinusbotQuotaValidator:
    arguments:
      $minQuota: '%app.sinusbot_quota_min%'
      $maxQuota: '%app.sinusbot_quota_max%'

  App\Module\Core\Application\AgentReleaseChecker:
    arguments:
      $repository: '%app.agent_release_repository%'
      $cacheTtlSeconds: '%env(int:APP_AGENT_RELEASE_CACHE_TTL)%'
      $channel: '%app.agent_release_channel%'

  App\Module\Core\Application\ChangelogFetcher:
    arguments:
      $repository: '%app.changelog_repository%'
      $cacheTtlSeconds: '%env(int:APP_CHANGELOG_CACHE_TTL)%'

  App\Module\Core\Application\CoreReleaseChecker:
    arguments:
      $repository: '%app.core_release_repository%'
      $cacheTtlSeconds: '%env(int:APP_CORE_RELEASE_CACHE_TTL)%'
      $channel: '%app.core_release_channel%'

  App\Module\Core\Application\GithubWorkflowDispatcher:
    arguments:
      $repository: '%app.core_update_repository%'
      $workflowFile: '%app.core_update_workflow%'
      $token: '%app.core_update_token%'

  App\Module\Setup\Application\WebinterfaceUpdateService:
    arguments:
      $httpClient: '@http_client'
      $settingsService: '@App\Module\Setup\Application\WebinterfaceUpdateSettingsService'
      $manifestUrl: '%app.core_update_manifest_url%'
      $installDir: '%app.core_update_install_dir%'
      $releasesDir: '%app.core_update_releases_dir%'
      $currentSymlink: '%app.core_update_current_symlink%'
      $lockFile: '%app.core_update_lock_file%'
      $excludes: '%app.core_update_excludes%'
      $fallbackVersion: '%app.core_version%'
      $releaseRepository: '%app.core_release_repository%'
      $releaseChannel: '%app.core_release_channel%'
      $kernelEnvironment: '%kernel.environment%'
      $kernelDebug: '%kernel.debug%'

  App\Module\Core\Application\UpdateJobService:
    arguments:
      $runnerCommand: '%app.core_update_runner_command%'
      $jobsDir: '%app.core_update_jobs_dir%'
      $logsDir: '%app.core_update_logs_dir%'
      $backupsDir: '%app.core_update_backups_dir%'
      $coreDir: '%kernel.project_dir%'
      $defaultPackageUrl: '%app.core_update_package_url%'

  App\Module\PanelAdmin\Application\AdminSshKeyService:
    arguments:
      $authorizedKeysPath: '%app.admin_authorized_keys_path%'


  App\Module\Core\Application\MailPasswordHasher:
    arguments:
      $algorithm: '%app.mail_password_hash_algorithm%'

  App\Module\Core\Application\Mail\MailUserProjector:
    tags:
      - { name: doctrine.event_subscriber }
  App\Module\Core\Domain\Event\EventBusInterface: '@App\Module\Core\Domain\Event\SymfonyEventBus'
  App\Module\Core\Application\MailboxStatsProviderInterface: '@App\Repository\MailboxRepository'

  App\Repository\MinecraftVersionCatalogRepositoryInterface: '@App\Repository\MinecraftVersionCatalogRepository'

  App\Module\Gameserver\Application\ConsoleCommandSettings: '@App\Module\Core\Application\AppSettingsService'

  App\Extension\ExtensionMenuRegistry:
    arguments:
      $menuProviders: !tagged_iterator 'app.extension.menu_provider'

  App\Module\Cms\Application\BlockRenderer\BlockRendererRegistry:
    arguments:
      $renderers: !tagged_iterator 'app.cms.block_renderer'

  App\Module\Cms\Application\BlockRenderer\HeroBlockRenderer:
    tags: ['app.cms.block_renderer']

  App\Module\Cms\Application\BlockRenderer\RichTextBlockRenderer:
    tags: ['app.cms.block_renderer']

  App\Module\Cms\Application\BlockRenderer\ImageBlockRenderer:
    tags: ['app.cms.block_renderer']

  App\Module\Cms\Application\BlockRenderer\CardsBlockRenderer:
    tags: ['app.cms.block_renderer']

  App\Module\Cms\Application\Security\CaptchaVerifierInterface: '@App\Module\Cms\Application\Security\NoneCaptchaVerifier'
  App\Module\Cms\Application\CmsMaintenanceWindowProviderInterface: '@App\Module\Cms\Application\CmsMaintenanceWindowProvider'

  App\Module\Cms\Application\CmsTemplateDeploymentManager:
    arguments:
      $deployRoot: '%kernel.project_dir%/var/cms-template-deployments'

  app.limiter_factory.agent_bootstrap:
    class: App\Module\Core\Application\SymfonyLimiterFactoryAdapter
    arguments:
      - '@limiter.agent_bootstrap'

  App\Module\Cms\UI\Controller\Public\PublicForumController:
    arguments:
      $forumReplyLimiter: '@limiter.forum_reply'
      $forumThreadLimiter: '@limiter.forum_thread'
      $forumReportLimiter: '@limiter.forum_report'

  App\Module\PanelCustomer\UI\Controller\Api\AgentApiController:
    arguments:
      $filesystemResolver: '@App\Module\Gameserver\Application\GameServerPathResolver'
      $jwtVerifier: '@App\Module\Core\Application\AgentJwtVerifier'
      $auditLogger: '@App\Module\Core\Application\AuditLogger'

  App\Module\Cms\UI\Controller\Public\PublicContactController:
    arguments:
      $contactLimiter: '@limiter.public_contact'

  App\Module\PanelCustomer\UI\Controller\Customer\CustomerMailController:
    arguments:
      $mailboxRepository: '@App\Repository\MailboxRepository'
      $mailAliasRepository: '@App\Repository\MailAliasRepository'
      $domainRepository: '@App\Repository\DomainRepository'
      $mailDomainRepository: '@App\Repository\MailDomainRepository'
      $mailPolicyRepository: '@App\Repository\MailPolicyRepository'
      $entityManager: '@doctrine.orm.entity_manager'
      $auditLogger: '@App\Module\Core\Application\AuditLogger'
      $encryptionService: '@App\Module\Core\Application\EncryptionService'
      $mailPasswordHasher: '@App\Module\Core\Application\MailPasswordHasher'
      $mailLimitEnforcer: '@App\Module\Core\Application\MailLimitEnforcer'
      $mailAliasLoopGuard: '@App\Module\Core\Application\MailAliasLoopGuard'
      $csrfTokenManager: '@security.csrf.token_manager'
      $twig: '@twig'

  Symfony\Component\HttpFoundation\UriSigner:
    arguments:
      $secret: '%kernel.secret%'


  App\Module\Gameserver\Application\Status\HmacRequestValidator:
    arguments:
      $sharedSecret: '%app.status_agent_shared_secret%'
      $maxSkewSeconds: '%app.status_agent_signature_skew_seconds%'

  App\Module\Gameserver\UI\Controller\Api\ServerStatusApiController:
    arguments:
      $staleGraceSeconds: '%app.status_stale_grace_seconds%'

  App\Security\IdentifierHasher:
    arguments:
      $pepper: '%app.identifier_hash_pepper%'

  App\Module\Voice\Application\VoiceRateLimitStateStoreInterface: '@App\Module\Voice\Application\DoctrineVoiceRateLimitStateStore'

  App\Module\Voice\Application\Provider\VoiceProviderRegistry:
    arguments:
      $adapters: !tagged_iterator 'app.voice_provider_adapter'

  App\Module\Voice\Application\Provider\Teamspeak3Adapter:
    tags: ['app.voice_provider_adapter']

  App\Module\Voice\Application\Provider\Teamspeak6Adapter:
    tags: ['app.voice_provider_adapter']

  App\Module\Voice\Application\Provider\SinusbotAdapter:
    tags: ['app.voice_provider_adapter']

  App\Module\Voice\Application\Provider\Ts3ServerLookupInterface: '@App\Module\Voice\Application\Provider\DoctrineTs3ServerLookup'
  App\Module\Voice\Application\Provider\Ts6ServerLookupInterface: '@App\Module\Voice\Application\Provider\DoctrineTs6ServerLookup'

  App\Module\Gameserver\Application\Query\QuerySmokeRunnerInterface: '@App\Module\Gameserver\Application\Query\QuerySmokeService'

  App\Module\HostingPanel\Application\Security\SecretVault:
    arguments:
      $encryptionKey: '%app.hosting_panel_secret_key%'

  App\Module\Core\Application\Backup\BackupPlanStoreInterface: '@App\Module\Core\Application\Backup\InMemoryBackupPlanStore'

  App\Module\Core\Application\Backup\BackupAdapterRegistry:
    arguments:
      $adapters:
        - '@App\Module\Core\Application\Backup\Adapter\WebBackupAdapter'
        - '@App\Module\Core\Application\Backup\Adapter\DbBackupAdapter'
        - '@App\Module\Core\Application\Backup\Adapter\MailBackupAdapter'
        - '@App\Module\Core\Application\Backup\Adapter\VoiceBackupAdapter'
        - '@App\Module\Core\Application\Backup\Adapter\GameBackupAdapter'

  App\Module\Core\Application\Backup\BackupTargetWriterRegistry:
    arguments:
      $writers:
        - '@App\Module\Core\Application\Backup\Target\LocalBackupTargetWriter'
        - '@App\Module\Core\Application\Backup\Target\WebDavBackupTargetWriter'
        - '@App\Module\Core\Application\Backup\Target\S3BackupTargetWriter'
        - '@App\Module\Core\Application\Backup\Target\SmbBackupTargetWriter'
        - '@App\Module\Core\Application\Backup\Target\NfsBackupTargetWriter'

  App\Module\Gameserver\Application\Console\ConsoleAgentGrpcClientInterface: '@App\Module\Gameserver\Infrastructure\Grpc\GrpcConsoleAgentGrpcClient'
  App\Module\Gameserver\Application\Console\ConsoleEventBusInterface: '@App\Module\Gameserver\Infrastructure\Console\FallbackConsoleEventBus'
  App\Module\Gameserver\Application\Console\AgentEndpointProbeInterface: '@App\Module\Gameserver\Infrastructure\Grpc\DoctrineAgentEndpointProbe'

  Redis:
    class: Redis
    factory: ['App\Module\Gameserver\Infrastructure\Redis\RedisConnectionFactory', 'create']
    arguments:
      $dsn: '%env(REDIS_DSN)%'

  App\Module\Gameserver\Infrastructure\Redis\RedisConsoleEventBus:
    arguments:
      $redis: '@Redis'

  App\Module\Gameserver\Infrastructure\Console\FallbackConsoleEventBus:
    arguments:
      $grpcClient: '@App\Module\Gameserver\Application\Console\ConsoleAgentGrpcClientInterface'
      $redis: '@?Redis'

  App\Module\Gameserver\Application\Console\SymfonyConsoleCommandLimiter:
    arguments:
      $consoleLimiter: '@limiter.instance_console_commands'

  App\Module\Gameserver\Application\Console\ConsoleCommandLimiterInterface: '@App\Module\Gameserver\Application\Console\SymfonyConsoleCommandLimiter'
