admin_nodes_panel_warning_intro: "Falls auf dem Server bereits ein Panel läuft, sollten keine Rollen aktiviert werden, die Systemdienste installieren oder ändern."
admin_nodes_panel_warning_roles: "Betroffen sind insbesondere Core, Web, Mail, DNS und DB."
admin_nodes_panel_warning_examples: "Beispiele für Panels: Plesk, aaPanel, cPanel, DirectAdmin, ISPConfig, HestiaCP."
admin_nodes_role_core_description: "Schreibt /etc/easywi/roles.d/core.conf, installiert nginx + PHP-FPM (paketabhängig) und aktiviert die zugehörigen systemd-Services. Firewall/DDoS werden über separate Agent-Jobs und Policies gesteuert."
admin_nodes_role_web_description: "Schreibt /etc/easywi/roles.d/web.conf, installiert nginx + PHP-FPM und aktiviert die Web-Services (nginx, php-fpm bzw. php8.x-fpm)."
admin_nodes_role_mail_description: "Schreibt /etc/easywi/roles.d/mail.conf, installiert Postfix + Dovecot und aktiviert die Mail-Services (postfix, dovecot)."
admin_nodes_role_dns_description: "Schreibt /etc/easywi/roles.d/dns.conf, installiert PowerDNS (pdns + backend) und aktiviert die DNS-Services."
admin_nodes_role_game_description: "Schreibt /etc/easywi/roles.d/game.conf, installiert Game-Abhängigkeiten (u. a. 32-bit Libs + Temurin JDK) und legt die EasyWI-Spielverzeichnisse unter /etc/easywi/game und /var/lib/easywi/game an."
admin_nodes_role_db_description: "Schreibt /etc/easywi/roles.d/db.conf, installiert MariaDB + PostgreSQL und aktiviert die Datenbank-Services."
admin_nodes_role_ts3_description: "Schreibt /etc/easywi/roles.d/ts3.conf und installiert Basis-Pakete (ca-certificates, curl, tar, xz, bzip2) für TS3-Workloads."
admin_nodes_role_ts6_description: "Schreibt /etc/easywi/roles.d/ts6.conf und installiert Basis-Pakete (ca-certificates, curl, tar, xz, bzip2) für TS6-Workloads."
admin_nodes_role_sinusbot_description: "Schreibt /etc/easywi/roles.d/sinusbot.conf und installiert Basis-Pakete (ca-certificates, curl, tar, xz, bzip2) für Sinusbot."
