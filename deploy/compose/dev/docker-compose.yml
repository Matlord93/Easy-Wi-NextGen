name: webinterface-dev

services:
  core:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - ../../shared/env/dev.env
    ports:
      - "${CORE_PORT:-8080}:8080"
    volumes:
      - ../../shared/nginx/core.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.50

  agent:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - ../../shared/env/dev.env
    ports:
      - "${AGENT_PORT:-8087}:8087"
    volumes:
      - ../../shared/nginx/agent.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8087/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.25

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../../shared/env/dev.env
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-webinterface}
      POSTGRES_USER: ${DB_USER:-webinterface}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-dev}
    volumes:
      - dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webinterface} -d ${DB_NAME:-webinterface}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 768m
    cpus: 1.00

  queue:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${QUEUE_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${QUEUE_PASSWORD:-change-me-queue}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${QUEUE_PASSWORD:-change-me-queue} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    mem_limit: 256m
    cpus: 0.25

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ["edge"]
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ../../shared/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      core:
        condition: service_healthy
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  metrics:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
    volumes:
      - ../../shared/prometheus/prometheus.stub.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${METRICS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  dev_db_data:
