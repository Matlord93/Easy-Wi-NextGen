type: object
required: [error]
properties:
  error:
    type: object
    required: [code, message, request_id]
    properties:
      code:
        type: string
        description: Stable machine-readable error code.
        enum:
          - INVALID_JSON
          - INVALID_PAYLOAD
          - VALIDATION_FAILED
          - UNAUTHORIZED
          - FORBIDDEN
          - NOT_FOUND
          - METHOD_NOT_ALLOWED
          - CONFLICT
          - INTERNAL_ERROR
      message:
        type: string
        description: Human-readable error message.
      request_id:
        type: string
        description: Request identifier from TASK-006 tracing headers.
      details:
        type: object
        additionalProperties: true
        description: Optional structured details for validation/debugging.

