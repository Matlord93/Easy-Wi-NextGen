name: agent-ci

on:
  pull_request:
    paths:
      - 'agent/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/agent-ci.yml'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'agent/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/agent-ci.yml'

permissions:
  contents: read

jobs:
  agent:
    name: agent-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: true
          cache-dependency-path: agent/go.sum


      - name: Setup Python for OpenAPI checks
        working-directory: .
        run: |
          python3 -m pip install --upgrade pip pyyaml

      - name: Validate Core-Agent OpenAPI spec
        working-directory: .
        run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Breaking-change check against main (Core-Agent OpenAPI)
        working-directory: .
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/core-agent.v1.openapi.yaml > /tmp/core-agent.base.yaml
          python3 "$GITHUB_WORKSPACE/docs/api/scripts/check_breaking_changes.py" /tmp/core-agent.base.yaml "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Verify golangci-lint config
        run: |
          if [[ ! -f .golangci.yml ]]; then
            echo 'Missing .golangci.yml. Add one or install golangci-lint with: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest' >&2
            exit 1
          fi

      - name: Clear Go build cache
        run: go clean -cache

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: agent
          args: --timeout=5m

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
