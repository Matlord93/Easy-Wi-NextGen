name: agent-ci

on:
  pull_request:
    paths:
      - 'agent/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/agent-ci.yml'
      - '.github/actions/configure-go-build-cache/**'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'agent/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/agent-ci.yml'
      - '.github/actions/configure-go-build-cache/**'

permissions:
  contents: read

jobs:
  agent:
    name: agent-ci
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: 'false'

      - name: Configure isolated Go build cache
        uses: ./.github/actions/configure-go-build-cache

      - name: Cache Go module downloads
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-${{ hashFiles('agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gomod-

      - name: Download Go modules
        run: go mod download

      - name: Verify Go modules
        run: go mod verify

      - name: Prepare Python for OpenAPI checks
        working-directory: .
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo 'Python 3 is not installed or is not on PATH. Ensure the selected CI runner provides Python 3.' >&2
            exit 1
          fi
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            rm -rf "${RUNNER_TEMP}/easywi-openapi-venv"
            python3 -m venv --system-site-packages "${RUNNER_TEMP}/easywi-openapi-venv"
            "${RUNNER_TEMP}/easywi-openapi-venv/bin/python" -m pip install pyyaml
            echo "${RUNNER_TEMP}/easywi-openapi-venv/bin" >> "${GITHUB_PATH}"
          fi

      - name: Validate Core-Agent OpenAPI spec
        working-directory: .
        run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Breaking-change check against main (Core-Agent OpenAPI)
        working-directory: .
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/core-agent.v1.openapi.yaml > /tmp/core-agent.base.yaml
          python3 "$GITHUB_WORKSPACE/docs/api/scripts/check_breaking_changes.py" /tmp/core-agent.base.yaml "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Verify golangci-lint config
        run: |
          if [[ ! -f .golangci.yml ]]; then
            echo 'Missing .golangci.yml. Add one or install golangci-lint with: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest' >&2
            exit 1
          fi

      - name: Clear Go build cache
        run: go clean -cache

      - name: Go test
        run: go test ./...
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Go vet
        run: go vet ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: agent
          args: --timeout=5m

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
