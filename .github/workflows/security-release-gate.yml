name: security-release-gate

on:
  workflow_run:
    workflows: ["Agent Release Builder"]
    types: [requested]

permissions:
  actions: write
  contents: read
  security-events: read

jobs:
  gate-critical-findings:
    name: gate-critical-findings
    if: ${{ github.event.workflow_run.event == 'workflow_dispatch' }}
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Ensure non-root runner user
        run: |
          set -euo pipefail
          current_uid="$(id -u)"
          current_user="$(id -un)"
          if [ "${current_uid}" -eq 0 ]; then
            echo "Selected runner must execute as a regular user, not root." >&2
            exit 1
          fi
          echo "Running as ${current_user} (uid ${current_uid})."

      - name: Check for open critical code scanning alerts
        id: critical
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          endpoint="https://api.github.com/repos/${REPO}/code-scanning/alerts?state=open&severity=critical&per_page=1"
          if ! response=$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$endpoint" 2>/tmp/github_api_err.log); then
            echo "Code scanning endpoint unavailable. Failing gate closed." >&2
            cat /tmp/github_api_err.log >&2 || true
            echo "critical_count=-1" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          normalized_response=$(printf '%s' "$response" | tr -d '[:space:]')
          if [ "$normalized_response" = '[]' ]; then
            critical_count=0
          else
            critical_count=1
          fi
          echo "critical_count=${critical_count}" >> "$GITHUB_OUTPUT"

          if [ "$critical_count" -gt 0 ]; then
            echo "Found ${critical_count} open critical code scanning finding(s)." >&2
            exit 1
          fi

      - name: Cancel release workflow run on gate failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          run_id="${{ github.event.workflow_run.id }}"
          echo "Cancelling release workflow run ${run_id} due to security gate failure."
          curl --fail-with-body --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${run_id}/cancel"

      - name: Gate passed
        if: ${{ success() }}
        run: echo "No open critical code scanning findings detected."
