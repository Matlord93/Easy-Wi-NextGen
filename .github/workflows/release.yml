name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect release channel
        id: channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nocasematch
          if [[ "$tag" == *-dev* || "$tag" == *-alpha* || "$tag" == *-snapshot* || "$tag" == *-nightly* ]]; then
            channel="dev"
            prerelease="true"
          elif [[ "$tag" == *-beta* || "$tag" == *-preview* || "$tag" == *-rc* ]]; then
            channel="beta"
            prerelease="true"
          else
            channel="stable"
            prerelease="false"
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Setup Go for agent builds
        if: ${{ hashFiles('agent/go.mod') != '' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          AGENT_LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=${BUILD_DATE}"

          tar \
            --exclude='core/.env.local' \
            --exclude='core/.env.local.php' \
            --exclude='var' \
            --exclude='storage' \
            --exclude='uploads' \
            --exclude='srv' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.git' \
            -czf dist/release/easywi-core.tar.gz core
          (cd . && zip -qr "dist/release/easywi-webinterface-${VERSION}.zip" core \
            -x 'core/.env.local' 'core/.env.local.php' 'core/var/*' 'core/storage/*' 'core/uploads/*' 'core/srv/*' 'core/node_modules/*' 'core/vendor/*')

          python - <<'PYTAR'
import tarfile
import sys

with tarfile.open('dist/release/easywi-core.tar.gz', 'r:gz') as archive:
    if 'core/.env' not in archive.getnames():
        print('core/.env missing from easywi-core.tar.gz', file=sys.stderr)
        sys.exit(1)
PYTAR
          unzip -l "dist/release/easywi-webinterface-${VERSION}.zip" core/.env >/dev/null \
            || { echo 'core/.env missing from easywi-webinterface zip' >&2; exit 1; }

          if [[ -f agent/go.mod ]]; then
            (cd agent && GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "${AGENT_LDFLAGS}" -o ../dist/release/easywi-agent-linux-amd64 ./cmd/agent)
            (cd agent && GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "${AGENT_LDFLAGS}" -o ../dist/release/easywi-agent-windows-amd64.exe ./cmd/agent)
            (cd dist/release && tar -czf easywi-agent-linux-amd64.tar.gz easywi-agent-linux-amd64)
            (cd dist/release && zip -q easywi-agent-linux-amd64.zip easywi-agent-linux-amd64)
            (cd dist/release && zip -q easywi-agent-windows-amd64.zip easywi-agent-windows-amd64.exe)
            rm -f dist/release/easywi-agent-linux-amd64 dist/release/easywi-agent-windows-amd64.exe
          else
            # TODO: Keep the release structure ready if the agent source is moved out of this repository.
            echo "agent/go.mod not found; skipping agent binaries" >&2
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist/release && sha256sum easywi-core.tar.gz > checksums-core.txt)
          (cd dist/release && sha256sum easywi-webinterface-*.zip > checksums-webinterface.txt)
          if compgen -G "dist/release/easywi-agent-*.zip" > /dev/null || compgen -G "dist/release/easywi-agent-*.tar.gz" > /dev/null; then
            (cd dist/release && sha256sum easywi-agent-*.zip easywi-agent-*.tar.gz 2>/dev/null > checksums-agent.txt || sha256sum easywi-agent-*.zip > checksums-agent.txt)
          else
            : > dist/release/checksums-agent.txt
          fi

      - name: Sign checksums (optional)
        env:
          EASYWI_RELEASE_PRIVATE_KEY: ${{ secrets.EASYWI_RELEASE_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${EASYWI_RELEASE_PRIVATE_KEY}" ]]; then
            echo "EASYWI_RELEASE_PRIVATE_KEY is not configured; skipping checksum signing" >&2
            exit 0
          fi
          printf '%s' "$EASYWI_RELEASE_PRIVATE_KEY" > /tmp/easywi-release-key.pem
          openssl dgst -sha256 -sign /tmp/easywi-release-key.pem -out dist/release/checksums-core.txt.asc dist/release/checksums-core.txt
          openssl dgst -sha256 -sign /tmp/easywi-release-key.pem -out dist/release/checksums-webinterface.txt.asc dist/release/checksums-webinterface.txt
          if [[ -s dist/release/checksums-agent.txt ]]; then
            openssl dgst -sha256 -sign /tmp/easywi-release-key.pem -out dist/release/checksums-agent.txt.asc dist/release/checksums-agent.txt
          fi
          rm -f /tmp/easywi-release-key.pem

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ steps.channel.outputs.prerelease }}
          fail_on_unmatched_files: false
          body: |
            channel: ${{ steps.channel.outputs.channel }}

            Assets:
            - easywi-core.tar.gz
            - easywi-webinterface-<version>.zip (version without leading v)
            - checksums-core.txt
            - checksums-webinterface.txt
            - easywi-agent-linux-amd64.tar.gz
            - easywi-agent-linux-amd64.zip
            - easywi-agent-windows-amd64.zip
            - checksums-agent.txt
          files: |
            dist/release/easywi-core.tar.gz
            dist/release/easywi-webinterface-*.zip
            dist/release/checksums-core.txt
            dist/release/checksums-core.txt.asc
            dist/release/checksums-webinterface.txt
            dist/release/checksums-webinterface.txt.asc
            dist/release/easywi-agent-linux-amd64.tar.gz
            dist/release/easywi-agent-linux-amd64.zip
            dist/release/easywi-agent-windows-amd64.zip
            dist/release/checksums-agent.txt
            dist/release/checksums-agent.txt.asc
