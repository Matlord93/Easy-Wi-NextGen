name: Core CI (Symfony)

on:
  push:
    branches: [ main, Dev, Beta ]
    tags: [ "v*.*.*" ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Core - tests
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Verify PHP 8.5 environment
        uses: ./.github/actions/verify-php
        with:
          required-extensions: mbstring,intl,pdo,pdo_mysql,pdo_pgsql,openssl

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('core/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --no-progress
      - name: Prepare Python for OpenAPI checks
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo 'Python 3 is not installed or is not on PATH. Ensure the selected CI runner provides Python 3.' >&2
            exit 1
          fi
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            rm -rf "${RUNNER_TEMP}/easywi-openapi-venv"
            python3 -m venv --system-site-packages "${RUNNER_TEMP}/easywi-openapi-venv"
            "${RUNNER_TEMP}/easywi-openapi-venv/bin/python" -m pip install pyyaml
            echo "${RUNNER_TEMP}/easywi-openapi-venv/bin" >> "${GITHUB_PATH}"
          fi
        working-directory: .

      - name: Validate Core-Agent OpenAPI spec
        run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"
        working-directory: .

      - name: Breaking-change check against main (Core-Agent OpenAPI)
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/core-agent.v1.openapi.yaml > /tmp/core-agent.base.yaml
          python3 "$GITHUB_WORKSPACE/docs/api/scripts/check_breaking_changes.py" /tmp/core-agent.base.yaml "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"
        working-directory: .

      - name: Lint (optional)
        run: |
          if composer run -q | grep -q "lint"; then composer run lint; else echo "No lint script"; fi

      - name: Tests (optional)
        run: |
          if composer run -q | grep -q "test"; then composer run test; else echo "No test script"; fi

  doctrine-schema:
    name: Core - Doctrine schema sync
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: core
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: easywi_test
          MARIADB_USER: easywi
          MARIADB_PASSWORD: easywi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: "mysql://easywi:easywi@127.0.0.1:3306/easywi_test?serverVersion=mariadb-10.11.0&charset=utf8mb4"
      APP_ENV: test
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user

      - name: Verify PHP 8.5 environment
        uses: ./.github/actions/verify-php
        with:
          required-extensions: mbstring,intl,pdo,pdo_mysql,openssl

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('core/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --no-progress --no-scripts

      - name: Doctrine mapping validation
        run: php bin/console doctrine:schema:validate --skip-sync --env=test --no-interaction

      - name: Run Doctrine migrations
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction --allow-no-migration

      - name: Validate Doctrine schema
        run: php bin/console doctrine:schema:validate --env=test --no-interaction

      - name: Doctrine schema diff must be empty
        run: |
          set -euo pipefail
          diff_output="$(php bin/console doctrine:schema:update --dump-sql --env=test --no-interaction)"
          printf '%s\n' "${diff_output}"
          if printf '%s\n' "${diff_output}" | grep -Eiq '^(CREATE|ALTER|DROP|RENAME|TRUNCATE|INSERT|UPDATE|DELETE)[[:space:]]'; then
            echo 'Doctrine schema:update emitted SQL; mapping and migrated schema are not in sync.' >&2
            exit 1
          fi

  release:
    name: Core - release bundle
    needs: [test, doctrine-schema]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Verify PHP 8.5 environment
        uses: ./.github/actions/verify-php

      - name: Install deps (prod)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Prepare bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          mkdir -p ../dist
          # Archiviert den core-Ordner ohne unnötige Dateien
          tar -czf "../dist/easywi-core-${VERSION}.tar.gz" \
            --exclude=".git" \
            --exclude="var/cache" \
            --exclude="var/log" \
            --exclude=".env.local" \
            --exclude="node_modules" \
            .

      - name: Generate checksums
        run: |
          cd ../dist
          sha256sum easywi-core-*.tar.gz > checksums-core.txt

      - name: Generate update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="easywi-core-${VERSION}.tar.gz"
          SHA256=$(sha256sum "../dist/${ARCHIVE}" | awk '{print $1}')
          export VERSION TAG ARCHIVE SHA256
          git fetch --tags --force
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fv "${TAG}" | head -n 1 || true)
          if [[ -n "${PREV_TAG}" ]]; then
            NOTES=$(git log --pretty=format:'- %s' "${PREV_TAG}..${TAG}")
          else
            NOTES=$(git log --pretty=format:'- %s' -n 20)
          fi
          NOTES="${NOTES}" python - <<'PY'
          import json
          import os

          payload = {
              "latest": os.environ["VERSION"],
              "asset_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['TAG']}/{os.environ['ARCHIVE']}",
              "sha256": os.environ["SHA256"],
              "notes": os.environ.get("NOTES", "").strip(),
          }
          with open("../dist/manifest.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, ensure_ascii=False)
              handle.write("\n")
          PY

      - name: Sign checksums and manifest (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.EASYWI_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.EASYWI_GPG_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "EASYWI_GPG_PRIVATE_KEY is not configured; skipping checksum and manifest signing." >&2
            exit 0
          fi
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            --armor --detach-sign ../dist/checksums-core.txt
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            --armor --detach-sign ../dist/manifest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Korrigierte Pfade, da die Dateien im Root-Dist Ordner liegen
          files: |
            dist/easywi-core-*.tar.gz
            dist/checksums-core.txt
            dist/checksums-core.txt.asc
            dist/manifest.json
            dist/manifest.json.asc
          generate_release_notes: true
          fail_on_unmatched_files: false
