name: Agent CI (Go)

on:
  push:
    branches: [ main, Dev, Beta ]
    tags: [ "v*.*.*" ]
  pull_request:

permissions:
  contents: read

jobs:
  contract:
    name: Agent - contract
    runs-on:
      - self-hosted
      - k8s-autoscaling-runner
      - linux
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Prepare Python for OpenAPI checks
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo 'Python 3 is not installed or is not on PATH. Preinstall Python 3 on the self-hosted runner.' >&2
            exit 1
          fi
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            rm -rf "${RUNNER_TEMP}/easywi-openapi-venv"
            python3 -m venv --system-site-packages "${RUNNER_TEMP}/easywi-openapi-venv"
            "${RUNNER_TEMP}/easywi-openapi-venv/bin/python" -m pip install pyyaml
            echo "${RUNNER_TEMP}/easywi-openapi-venv/bin" >> "${GITHUB_PATH}"
          fi

      - name: Validate Core-Agent OpenAPI spec
        run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Breaking-change check against main (Core-Agent OpenAPI)
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/core-agent.v1.openapi.yaml > /tmp/core-agent.base.yaml
          python3 "$GITHUB_WORKSPACE/docs/api/scripts/check_breaking_changes.py" /tmp/core-agent.base.yaml "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Agent contract tests
        run: go test ./internal/api -run 'Contract|Spec'
        working-directory: agent

  build:
    name: Agent - build/test/smoke (${{ matrix.target_os }})
    needs: contract
    runs-on:
      - self-hosted
      - k8s-autoscaling-runner
      - linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            artifact_suffix: ""
          - target_os: windows
            artifact_suffix: .exe
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Clear Go build cache
        run: go clean -cache

      - name: Go test
        run: go test ./...

      - name: Smoke test (agent startup + core connectivity + dummy job)
        run: go test ./cmd/agent -run TestAgentCoreConnectivitySmoke

      - name: Build agent
        shell: bash
        run: |
          mkdir -p ../dist/${{ matrix.target_os }}
          GOOS=${{ matrix.target_os }} GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../dist/${{ matrix.target_os }}/easywi-agent${{ matrix.artifact_suffix }} ./cmd/agent

      - name: Build easywi-sftp
        shell: bash
        run: |
          GOOS=${{ matrix.target_os }} GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../dist/${{ matrix.target_os }}/easywi-sftp${{ matrix.artifact_suffix }} ./cmd/easywi-sftp

      - name: Generate checksums
        run: |
          cd ../dist/${{ matrix.target_os }}
          sha256sum easywi-* > checksums-agent-${{ matrix.target_os }}.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: agent-binaries-${{ matrix.target_os }}
          path: |
            dist/${{ matrix.target_os }}/easywi-agent*
            dist/${{ matrix.target_os }}/easywi-sftp*
            dist/${{ matrix.target_os }}/checksums-agent-*.txt

  release:
    name: Agent - publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on:
      - self-hosted
      - k8s-autoscaling-runner
      - linux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent-binaries-*
          merge-multiple: true
          path: dist

      - name: Sign checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.EASYWI_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.EASYWI_GPG_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "Missing GPG signing key (EASYWI_GPG_PRIVATE_KEY)." >&2
            exit 1
          fi
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          for file in dist/checksums-agent-*.txt; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
              --armor --detach-sign "$file"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/easywi-agent*
            dist/easywi-sftp*
            dist/checksums-agent-*.txt
            dist/checksums-agent-*.txt.asc
          generate_release_notes: false
