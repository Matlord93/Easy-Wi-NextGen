name: Agent CI (Go)

on:
  push:
    branches: [ main, Dev, Beta ]
    tags: [ "v*.*.*" ]
  pull_request:

permissions:
  contents: read

jobs:
  contract:
    name: Agent - contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python for OpenAPI checks
        run: |
          python3 -m pip install --upgrade pip pyyaml

      - name: Validate Core-Agent OpenAPI spec
        run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Breaking-change check against main (Core-Agent OpenAPI)
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/core-agent.v1.openapi.yaml > /tmp/core-agent.base.yaml
          python3 "$GITHUB_WORKSPACE/docs/api/scripts/check_breaking_changes.py" /tmp/core-agent.base.yaml "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Agent contract tests
        run: go test ./internal/api -run 'Contract|Spec'
        working-directory: agent

  build:
    name: Agent - build/test/smoke (${{ matrix.os }})
    needs: contract
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Clear Go build cache
        run: go clean -cache

      - name: Go test
        run: go test ./...

      - name: Smoke test (agent startup + core connectivity + dummy job)
        run: go test ./cmd/agent -run TestAgentCoreConnectivitySmoke

      - name: Build agent
        shell: bash
        run: |
          mkdir -p ../dist/${{ matrix.os }}
          go build -trimpath -ldflags="-s -w" \
            -o ../dist/${{ matrix.os }}/easywi-agent ./cmd/agent

      - name: Build easywi-sftp
        shell: bash
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o ../dist/${{ matrix.os }}/easywi-sftp ./cmd/easywi-sftp

      - name: Add executable suffix on Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item -Path ../dist/${{ matrix.os }}/easywi-agent -Destination ../dist/${{ matrix.os }}/easywi-agent.exe
          Move-Item -Path ../dist/${{ matrix.os }}/easywi-sftp -Destination ../dist/${{ matrix.os }}/easywi-sftp.exe

      - name: Generate checksums
        if: runner.os != 'Windows'
        run: |
          cd ../dist/${{ matrix.os }}
          sha256sum easywi-* > checksums-agent-${{ runner.os }}.txt

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem ../dist/${{ matrix.os }}/easywi-* | Sort-Object Name
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)"
          }
          Set-Content -Path ../dist/${{ matrix.os }}/checksums-agent-${{ runner.os }}.txt -Value $lines

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: agent-binaries-${{ matrix.os }}
          path: |
            dist/${{ matrix.os }}/easywi-agent*
            dist/${{ matrix.os }}/easywi-sftp*
            dist/${{ matrix.os }}/checksums-agent-*.txt

  release:
    name: Agent - publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent-binaries-*
          merge-multiple: true
          path: dist

      - name: Sign checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.EASYWI_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.EASYWI_GPG_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "Missing GPG signing key (EASYWI_GPG_PRIVATE_KEY)." >&2
            exit 1
          fi
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          for file in dist/checksums-agent-*.txt; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
              --armor --detach-sign "$file"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/easywi-agent*
            dist/easywi-sftp*
            dist/checksums-agent-*.txt
            dist/checksums-agent-*.txt.asc
          generate_release_notes: false
