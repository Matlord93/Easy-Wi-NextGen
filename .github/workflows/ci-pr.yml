name: PR Fast Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (Symfony) - install + tests
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: core
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: easywi_test
          MARIADB_USER: easywi
          MARIADB_PASSWORD: easywi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_ENV: test
      APP_DEBUG: '0'
      DATABASE_URL: "mysql://easywi:easywi@127.0.0.1:3306/easywi_test?serverVersion=mariadb-10.11.0&charset=utf8mb4"
    steps:
      - uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Verify PHP 8.5 environment
        uses: ./.github/actions/verify-php
        with:
          required-extensions: mbstring,intl,pdo,pdo_mysql,pdo_pgsql,openssl

      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: |
            ~/.composer/cache/files
          key: ${{ runner.os }}-php85-${{ hashFiles('core/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php85-

      - name: Composer install
        run: composer install --no-interaction --no-progress

      - name: Sanity check vendor
        run: |
          if [[ ! -f vendor/symfony/polyfill-uuid/bootstrap.php ]]; then
            echo "vendor missing symfony/polyfill-uuid, reinstalling" >&2
            rm -rf vendor
            composer install --no-interaction --no-progress
          fi

      - name: Guardrail - freeze legacy migration collection
        run: |
          set -euo pipefail
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.sha }}'

          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -qx 'core/migrations/Migrations.php'; then
            echo 'core/migrations/Migrations.php ist eingefroren (legacy). Neue Migrationen nur als einzelne Datei.' >&2
            exit 1
          fi

      - name: Guardrail - one migration class per file
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(migrations/*.php)

          for file in "${files[@]}"; do
            base="$(basename "${file}")"

            if [[ "${base}" == 'Migrations.php' ]]; then
              continue
            fi

            if [[ ! "${base}" =~ ^Version[0-9]{14}\.php$ ]]; then
              echo "Ungültiger Migrations-Dateiname: ${base}" >&2
              exit 1
            fi

            class_count="$(grep -E -c '^final class Version[0-9]{14} extends AbstractMigration$' "${file}")"
            if [[ "${class_count}" -ne 1 ]]; then
              echo "${file} muss genau eine finale Version-Klasse enthalten." >&2
              exit 1
            fi
          done

      - name: Doctrine mapping validation (CI safety)
        run: php bin/console doctrine:schema:validate --skip-sync --env=test --no-interaction

      - name: Doctrine migrations (CI safety)
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction --allow-no-migration

      - name: Doctrine migrations status (CI diagnostics)
        run: php bin/console doctrine:migrations:status --env=test --no-interaction -vvv

      - name: Doctrine schema diff must be empty (CI safety)
        run: |
          set -euo pipefail
          diff_output="$(php bin/console doctrine:schema:update --dump-sql --env=test --no-interaction)"
          printf '%s\n' "${diff_output}"
          if printf '%s\n' "${diff_output}" | grep -Eiq '^(CREATE|ALTER|DROP|RENAME|TRUNCATE|INSERT|UPDATE|DELETE)[[:space:]]'; then
            echo 'Doctrine schema:update emitted SQL; mapping and migrated schema are not in sync.' >&2
            exit 1
          fi

      - name: Doctrine schema validation (CI safety)
        run: php bin/console doctrine:schema:validate --env=test --no-interaction

      - name: Lint (optional)
        run: |
          if composer run --list -q | grep -q "lint"; then composer run lint; else echo "No lint script"; fi

      - name: Tests (optional)
        run: |
          if composer run --list -q | grep -q "test"; then composer run test; else echo "No test script"; fi

  agent:
    name: Agent (Go) - build/test/smoke (linux)
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: 'false'

      - name: Configure isolated Go build cache
        uses: ./.github/actions/configure-go-build-cache

      - name: Cache Go module downloads
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-${{ hashFiles('agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gomod-

      - name: Download Go modules
        run: go mod download

      - name: Verify Go modules
        run: go mod verify

      - name: Go test
        run: go test ./...

      - name: Smoke test (agent startup + core connectivity + dummy job)
        run: go test ./cmd/agent -run TestAgentCoreConnectivitySmoke

      - name: Build agent (Linux target)
        run: go build -trimpath -ldflags="-s -w" ./cmd/agent

      - name: Build easywi-sftp (Linux target)
        run: go build -trimpath -ldflags="-s -w" ./cmd/easywi-sftp

      - name: Build agent (Windows target)
        run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" ./cmd/agent

      - name: Build easywi-sftp (Windows target)
        run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" ./cmd/easywi-sftp


  smoke-gates:
    name: Smoke Gates (config + smoke script)
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: "Pre-deploy gate: validate compose config (dev)"
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo 'Docker is not installed or is not on PATH; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo 'Docker Compose is not available; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          docker compose --env-file deploy/shared/env/dev.env -f deploy/compose/dev/docker-compose.yml config

      - name: "Pre-deploy gate: validate compose config (stage)"
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo 'Docker is not installed or is not on PATH; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo 'Docker Compose is not available; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          docker compose --env-file deploy/shared/env/stage.env -f deploy/compose/stage/docker-compose.yml config

      - name: "Post-deploy gate: smoke script executable"
        run: SMOKE_SKIP_RUNTIME_CHECKS=1 bash ./scripts/smoke.sh

  installer:
    name: Installer - lint
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: ShellCheck (bash installer)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: installer
