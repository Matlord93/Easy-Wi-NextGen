name: PR Fast Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (Symfony) - install + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, pdo, pdo_mysql, pdo_pgsql, openssl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache/files
          key: ${{ runner.os }}-php84-${{ hashFiles('core/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php84-

      - name: Composer install
        run: composer install --no-interaction --no-progress

      - name: Sanity check vendor
        run: |
          if [[ ! -f vendor/symfony/polyfill-uuid/bootstrap.php ]]; then
            echo "vendor missing symfony/polyfill-uuid, reinstalling" >&2
            rm -rf vendor
            composer install --no-interaction --no-progress
          fi

      - name: Guardrail - freeze legacy migration collection
        run: |
          set -euo pipefail
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.sha }}'

          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -qx 'core/migrations/Migrations.php'; then
            echo 'core/migrations/Migrations.php ist eingefroren (legacy). Neue Migrationen nur als einzelne Datei.' >&2
            exit 1
          fi

      - name: Guardrail - one migration class per file
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(migrations/*.php)

          for file in "${files[@]}"; do
            base="$(basename "${file}")"

            if [[ "${base}" == 'Migrations.php' ]]; then
              continue
            fi

            if [[ ! "${base}" =~ ^Version[0-9]{14}\.php$ ]]; then
              echo "Ungültiger Migrations-Dateiname: ${base}" >&2
              exit 1
            fi

            class_count="$(grep -E -c '^final class Version[0-9]{14} extends AbstractMigration$' "${file}")"
            if [[ "${class_count}" -ne 1 ]]; then
              echo "${file} muss genau eine finale Version-Klasse enthalten." >&2
              exit 1
            fi
          done

      - name: Doctrine schema validate (CI safety)
        env:
          APP_ENV: test
          APP_DEBUG: '0'
          DATABASE_URL: 'sqlite:///%kernel.project_dir%/var/ci_migrations.db'
        run: php bin/console doctrine:schema:validate --skip-sync --no-interaction

      - name: Doctrine migrations dry-run (CI safety)
        env:
          APP_ENV: test
          APP_DEBUG: '0'
          DATABASE_URL: 'sqlite:///%kernel.project_dir%/var/ci_migrations.db'
        run: php bin/console doctrine:migrations:migrate --dry-run --no-interaction --allow-no-migration

      - name: Lint (optional)
        run: |
          if composer run --list -q | grep -q "lint"; then composer run lint; else echo "No lint script"; fi

      - name: Tests (optional)
        run: |
          if composer run --list -q | grep -q "test"; then composer run test; else echo "No test script"; fi

  agent:
    name: Agent (Go) - build/test/smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.0"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Go test
        run: go test ./...

      - name: Smoke test (agent startup + core connectivity + dummy job)
        run: go test ./cmd/agent -run TestAgentCoreConnectivitySmoke

      - name: Build agent
        run: go build -trimpath -ldflags="-s -w" ./cmd/agent

      - name: Build easywi-sftp
        run: go build -trimpath -ldflags="-s -w" ./cmd/easywi-sftp


  smoke-gates:
    name: Smoke Gates (config + smoke script)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Pre-deploy gate: validate compose config (dev)"
        run: docker compose --env-file deploy/shared/env/dev.env -f deploy/compose/dev/docker-compose.yml config

      - name: "Pre-deploy gate: validate compose config (stage)"
        run: docker compose --env-file deploy/shared/env/stage.env -f deploy/compose/stage/docker-compose.yml config

      - name: "Post-deploy gate: smoke script executable"
        run: SMOKE_SKIP_RUNTIME_CHECKS=1 bash ./scripts/smoke.sh

  installer:
    name: Installer - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck (bash installer)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: installer
