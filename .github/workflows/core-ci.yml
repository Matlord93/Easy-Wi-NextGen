name: core-ci

on:
  pull_request:
    paths:
      - 'core/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/core-ci.yml'
      - '.github/actions/verify-php/**'
      - 'scripts/smoke.sh'
      - 'deploy/compose/**'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'core/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/core-ci.yml'
      - '.github/actions/verify-php/**'
      - 'scripts/smoke.sh'
      - 'deploy/compose/**'

permissions:
  contents: read

jobs:
  core:
    name: core-ci
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: core
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: easywi_test
          MARIADB_USER: easywi
          MARIADB_PASSWORD: easywi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_ENV: test
      APP_DEBUG: '0'
      DATABASE_URL: "mysql://easywi:easywi@127.0.0.1:3306/easywi_test?serverVersion=mariadb-10.11.0&charset=utf8mb4"
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Verify PHP 8.5 environment
        uses: ./.github/actions/verify-php
        with:
          required-extensions: mbstring,intl,pdo,pdo_mysql,pdo_pgsql,openssl

      - name: Composer validate
        run: composer validate --strict

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('core/composer.lock') }}

      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts
        env:
          SYMFONY_DISABLE_AUTO_SCRIPTS: '1'


      - name: Prepare Python for OpenAPI checks
        working-directory: .
        run: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo 'Python 3 is not installed or is not on PATH. Ensure the selected CI runner provides Python 3.' >&2
            exit 1
          fi
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            rm -rf "${RUNNER_TEMP}/easywi-openapi-venv"
            python3 -m venv --system-site-packages "${RUNNER_TEMP}/easywi-openapi-venv"
            "${RUNNER_TEMP}/easywi-openapi-venv/bin/python" -m pip install pyyaml
            echo "${RUNNER_TEMP}/easywi-openapi-venv/bin" >> "${GITHUB_PATH}"
          fi

      - name: Validate Core-Agent OpenAPI spec
        working-directory: .
        run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Breaking-change check against main (Core-Agent OpenAPI)
        working-directory: .
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/api/core-agent.v1.openapi.yaml > /tmp/core-agent.base.yaml
          python3 "$GITHUB_WORKSPACE/docs/api/scripts/check_breaking_changes.py" /tmp/core-agent.base.yaml "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"

      - name: Guardrail - freeze legacy migration collection
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.sha }}'

          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -qx 'core/migrations/Migrations.php'; then
            echo 'core/migrations/Migrations.php ist eingefroren (legacy). Neue Migrationen nur als einzelne Datei.' >&2
            exit 1
          fi

      - name: Guardrail - one migration class per file
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(migrations/*.php)

          for file in "${files[@]}"; do
            base="$(basename "${file}")"

            if [[ "${base}" == 'Migrations.php' ]]; then
              continue
            fi

            if [[ ! "${base}" =~ ^Version[0-9]{14}\.php$ ]]; then
              echo "Ungültiger Migrations-Dateiname: ${base}" >&2
              exit 1
            fi

            class_count="$(grep -E -c '^final class Version[0-9]{14} extends AbstractMigration$' "${file}")"
            if [[ "${class_count}" -ne 1 ]]; then
              echo "${file} muss genau eine finale Version-Klasse enthalten." >&2
              exit 1
            fi
          done

      - name: Doctrine mapping validation (CI safety)
        run: php bin/console doctrine:schema:validate --skip-sync --env=test --no-interaction

      - name: Doctrine migrations (CI safety)
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction --allow-no-migration

      - name: Doctrine migrations status (CI diagnostics)
        run: php bin/console doctrine:migrations:status --env=test --no-interaction -vvv

      - name: Doctrine schema diff must be empty (CI safety)
        run: |
          set -euo pipefail
          diff_output="$(php bin/console doctrine:schema:update --dump-sql --env=test --no-interaction)"
          printf '%s\n' "${diff_output}"
          if printf '%s\n' "${diff_output}" | grep -Eiq '^(CREATE|ALTER|DROP|RENAME|TRUNCATE|INSERT|UPDATE|DELETE)[[:space:]]'; then
            echo 'Doctrine schema:update emitted SQL; mapping and migrated schema are not in sync.' >&2
            exit 1
          fi

      - name: Doctrine schema validation (CI safety)
        run: php bin/console doctrine:schema:validate --env=test --no-interaction

      - name: Verify required tools
        run: |
          if ! composer show phpunit/phpunit >/dev/null 2>&1; then
            echo 'Missing phpunit/phpunit. Install with: composer require --dev phpunit/phpunit' >&2
            exit 1
          fi
          if ! composer show phpstan/phpstan >/dev/null 2>&1; then
            echo 'Missing phpstan/phpstan. Install with: composer require --dev phpstan/phpstan' >&2
            exit 1
          fi
          if ! composer show friendsofphp/php-cs-fixer >/dev/null 2>&1; then
            echo 'Missing friendsofphp/php-cs-fixer. Install with: composer require --dev friendsofphp/php-cs-fixer' >&2
            exit 1
          fi

      - name: PHP lint
        env:
          APP_ENV: test
          APP_DEBUG: '0'
        run: composer run lint

      - name: PHPUnit
        env:
          XDEBUG_MODE: off
          PHP_MEMORY_LIMIT: 768M
        run: php -d memory_limit=${PHP_MEMORY_LIMIT} bin/phpunit --do-not-cache-result

      - name: PHPStan
        run: composer run phpstan

      - name: PHP CS Fixer (dry-run)
        run: composer run cs:check

  smoke-gates:
    name: smoke-gates
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: "Pre-deploy gate: validate compose config (dev)"
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo 'Docker is not installed or is not on PATH; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo 'Docker Compose is not available; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          docker compose --env-file deploy/shared/env/dev.env -f deploy/compose/dev/docker-compose.yml config

      - name: "Pre-deploy gate: validate compose config (stage)"
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo 'Docker is not installed or is not on PATH; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo 'Docker Compose is not available; skipping compose config validation on this runner.' >&2
            exit 0
          fi
          docker compose --env-file deploy/shared/env/stage.env -f deploy/compose/stage/docker-compose.yml config

      - name: "Post-deploy gate: smoke script executable"
        run: SMOKE_SKIP_RUNTIME_CHECKS=1 bash ./scripts/smoke.sh
