name: security-codeql

on:
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'core/**'
      - 'agent/**'
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/security-codeql.yml'
  pull_request:
    branches: [ main, Dev, Beta ]
    paths:
      - 'core/**'
      - 'agent/**'
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/security-codeql.yml'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: security-codeql
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Go: CodeQL ---
      - name: Initialize CodeQL (Go)
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: +security-extended

      - name: Autobuild (Go)
        uses: github/codeql-action/autobuild@v4

      - name: Analyze (Go)
        uses: github/codeql-action/analyze@v4
        with:
          fail-on: warning

      - name: Run Psalm security scan (PHP)
        id: psalm
        uses: docker://ghcr.io/psalm/psalm-security-scan:5.7.7
        continue-on-error: true

      - name: Upload Psalm SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: psalm-php
