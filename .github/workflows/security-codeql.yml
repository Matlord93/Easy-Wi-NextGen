name: security-codeql

on:
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'core/**'
      - 'agent/**'
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/security-codeql.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'agent/**'
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/security-codeql.yml'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: security-codeql
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL (Go)
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: +security-extended
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild (Go)
        uses: github/codeql-action/autobuild@v4

      - name: Analyze (Go)
        uses: github/codeql-action/analyze@v4
        with:
          fail-on: warning

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Run Psalm security scan (PHP)
        id: psalm
        run: |
          set -e
          composer global require vimeo/psalm --prefer-dist --no-progress --dev
          PSALM_BIN="$(composer global config bin-dir --absolute)/psalm"
          cd core
          composer install --no-scripts --no-progress
          set +e
          "$PSALM_BIN" --output-format=github --taint-analysis --report=../results.sarif
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Psalm SARIF to GitHub Code Scanning
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: psalm-php

      - name: Fail on Psalm findings
        if: steps.psalm.outputs.exit_code != '0'
        run: exit 1
