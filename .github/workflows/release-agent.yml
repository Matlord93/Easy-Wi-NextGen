name: Agent Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build agent + wrapper + publish release
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.EASYWI_GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.EASYWI_GPG_PASSPHRASE }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.0"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Build linux-amd64 binaries
        run: |
          mkdir -p ../dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../dist/easywi-agent-linux-amd64 ./cmd/agent
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../dist/easywi-wrapper-linux-amd64 ./cmd/easywi-wrapper

      - name: Build windows-amd64 binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../dist/easywi-agent-windows-amd64.exe ./cmd/agent
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o ../dist/easywi-wrapper-windows-amd64.exe ./cmd/easywi-wrapper

      - name: Validate expected binaries exist
        run: |
          test -f ../dist/easywi-agent-linux-amd64
          test -f ../dist/easywi-agent-windows-amd64.exe
          test -f ../dist/easywi-wrapper-linux-amd64
          test -f ../dist/easywi-wrapper-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd ../dist
          sha256sum easywi-* > checksums.txt

      - name: Sign checksums
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        run: |
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            --armor --detach-sign --output ../dist/checksums.txt.asc ../dist/checksums.txt
          if [[ ! -f ../dist/checksums.txt.asc ]]; then
            echo "Failed to create checksums.txt.asc" >&2
            exit 1
          fi

      - name: Prepare release assets
        id: release_assets
        run: |
          files="dist/easywi-agent-*"$'\n'"dist/easywi-wrapper-*"$'\n'"dist/checksums.txt"
          if [[ -f ../dist/checksums.txt.asc ]]; then
            files="$files"$'\n'"dist/checksums.txt.asc"
          fi
          printf 'files<<EOF\n%s\nEOF\n' "$files" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Agent ${{ inputs.version }}
          files: ${{ steps.release_assets.outputs.files }}
          generate_release_notes: true
