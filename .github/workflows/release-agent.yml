name: Agent Release Builder

on:
  push:
    tags:
      - 'agent-v*'
  release:
    types: [published, prereleased, released]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. agent-v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build agent + publish release
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    env:
      GPG_PRIVATE_KEY: ${{ secrets.EASYWI_GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.EASYWI_GPG_PASSPHRASE }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'release' && github.event.release.tag_name || github.ref }}


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [[ -n "${RELEASE_TAG}" ]]; then
            raw_version="${RELEASE_TAG}"
          elif [[ -n "${REF_NAME}" && "${REF_TYPE}" == "tag" ]]; then
            raw_version="${REF_NAME}"
          else
            raw_version="${INPUT_VERSION}"
          fi

          if [[ -z "${raw_version}" ]]; then
            echo "No release version was supplied. Use an agent-v* tag, publish a release, or pass workflow_dispatch input 'version'." >&2
            exit 1
          fi

          version="${raw_version#agent-v}"
          version="${version#v}"
          if [[ -z "${version}" ]]; then
            echo "Release version must not be empty." >&2
            exit 1
          fi
          if [[ "${raw_version}" != agent-v* && "${raw_version}" != v* ]]; then
            echo "Release version must look like agent-vX.Y.Z or vX.Y.Z (got '${raw_version}')." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${raw_version}" >> "$GITHUB_OUTPUT"

      - name: Detect release channel
        id: channel
        env:
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          shopt -s nocasematch
          if [[ "${version}" == *-dev* || "${version}" == *-alpha* || "${version}" == *-snapshot* || "${version}" == *-nightly* ]]; then
            channel="dev"
            prerelease="true"
          elif [[ "${version}" == *-beta* || "${version}" == *-preview* || "${version}" == *-rc* || "${RELEASE_PRERELEASE}" == "true" ]]; then
            channel="beta"
            prerelease="true"
          else
            channel="stable"
            prerelease="false"
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: 'false'

      - name: Configure isolated Go build cache
        uses: ./.github/actions/configure-go-build-cache

      - name: Build agent binaries
        run: |
          mkdir -p ../dist
          agent_targets=("linux amd64" "linux arm64" "windows amd64")
          for target in "${agent_targets[@]}"; do
            read -r goos goarch <<<"$target"
            out="../dist/easywi-agent-${goos}-${goarch}"
            [[ "$goos" == "windows" ]] && out+=".exe"
            build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=${build_date}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags "$ldflags" \
              -o "$out" ./cmd/agent
          done


      - name: Package artifacts
        run: |
          cd ../dist
          for bin in easywi-agent-linux-amd64 easywi-agent-linux-arm64; do
            tar -czf "$bin.tar.gz" "$bin"
            zip -q "$bin.zip" "$bin"
          done
          zip -q easywi-agent-windows-amd64.zip easywi-agent-windows-amd64.exe

      - name: Generate checksums + manifest
        run: |
          cd ../dist
          sha256sum *.zip *.tar.gz > checksums.sha256
          cat > manifest.json <<JSON
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit": "${{ github.sha }}",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifacts": ["easywi-agent-linux-amd64.tar.gz","easywi-agent-linux-amd64.zip","easywi-agent-linux-arm64.tar.gz","easywi-agent-linux-arm64.zip","easywi-agent-windows-amd64.zip"]
          }
          JSON

      - name: Sign checksums
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        run: |
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}"             --armor --detach-sign --output ../dist/checksums.sha256.asc ../dist/checksums.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agent ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          files: |
            dist/easywi-agent-*.zip
            dist/easywi-agent-*.tar.gz
            dist/checksums.sha256
            dist/checksums.sha256.asc
            dist/manifest.json
          generate_release_notes: true
          fail_on_unmatched_files: false
