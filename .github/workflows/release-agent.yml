name: Agent Release Builder

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. agent-v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build agent + publish release
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.EASYWI_GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.EASYWI_GPG_PASSPHRASE }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        run: |
          if [[ -n "${{ github.ref_name }}" && "${{ github.ref_type }}" == "tag" ]]; then
            version="${{ github.ref_name }}"
          else
            version="${{ inputs.version }}"
          fi
          version="${version#agent-v}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=agent-v$version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.0"
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Build agent binaries
        run: |
          mkdir -p ../dist
          targets=("linux amd64" "linux arm64" "windows amd64")
          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            out="../dist/easywi-agent-${goos}-${goarch}"
            [[ "$goos" == "windows" ]] && out+=".exe"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath               -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"               -o "$out" ./cmd/agent
          done

      - name: Package artifacts
        run: |
          cd ../dist
          for bin in easywi-agent-linux-amd64 easywi-agent-linux-arm64; do
            tar -czf "$bin.tar.gz" "$bin"
            zip -q "$bin.zip" "$bin"
          done
          zip -q easywi-agent-windows-amd64.zip easywi-agent-windows-amd64.exe

      - name: Generate checksums + manifest
        run: |
          cd ../dist
          sha256sum *.zip *.tar.gz > checksums.sha256
          cat > manifest.json <<JSON
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit": "${{ github.sha }}",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifacts": ["easywi-agent-linux-amd64.tar.gz","easywi-agent-linux-amd64.zip","easywi-agent-linux-arm64.tar.gz","easywi-agent-linux-arm64.zip","easywi-agent-windows-amd64.zip"]
          }
          JSON

      - name: Sign checksums
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        run: |
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}"             --armor --detach-sign --output ../dist/checksums.sha256.asc ../dist/checksums.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agent ${{ steps.version.outputs.version }}
          files: |
            dist/easywi-agent-*.zip
            dist/easywi-agent-*.tar.gz
            dist/checksums.sha256
            dist/checksums.sha256.asc
            dist/manifest.json
          generate_release_notes: true
