name: security-dependency-review

on:
  pull_request:
    paths:
      - 'core/**'
      - 'agent/**'
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/security-dependency-review.yml'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'core/**'
      - 'agent/**'
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/security-dependency-review.yml'

permissions:
  contents: read

jobs:
  dependency-review:
    name: security-dependency-review
    runs-on:
      - self-hosted
      - k8s-autoscaling-runner
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fail-on-severity: critical
