name: Agent Mail Skeleton CI

on:
  pull_request:
    paths:
      - 'agent/**'
      - '.github/workflows/agent-mail-skeleton-ci.yml'
      - '.github/actions/configure-go-build-cache/**'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'agent/**'
      - '.github/workflows/agent-mail-skeleton-ci.yml'
      - '.github/actions/configure-go-build-cache/**'

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on:
      - self-hosted
      - k8s-autoscaling-runner
      - linux
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Configure isolated Go build cache
        uses: ./.github/actions/configure-go-build-cache

      - name: Format check
        run: |
          files=$(gofmt -l ./cmd ./internal)
          if [ -n "$files" ]; then
            echo "Go files not formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -o bin/easywi-agent ./cmd/agent
