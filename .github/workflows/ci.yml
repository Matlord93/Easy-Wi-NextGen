name: ci

on:
  pull_request:
  push:
    branches: [main, Dev, Beta]

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: php bin/phpunit --testsuite default

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
      - run: go test ./...
      - run: go vet ./...

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"
