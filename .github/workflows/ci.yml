name: ci

on:
  pull_request:
  push:
    branches: [main, Dev, Beta]

permissions:
  contents: read

jobs:
  core:
    runs-on:
      - self-hosted
      - linux
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6

      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Verify PHP 8.5 environment
        uses: ./.github/actions/verify-php
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          SYMFONY_DISABLE_AUTO_SCRIPTS: '1'
      - run: php bin/phpunit --testsuite default

  agent:
    runs-on:
      - self-hosted
      - linux
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
      - run: go test ./...
      - run: go vet ./...

  contract:
    runs-on:
      - self-hosted
      - linux
    steps:
      - uses: actions/checkout@v6

      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - run: python3 "$GITHUB_WORKSPACE/docs/api/scripts/validate_openapi.py" "$GITHUB_WORKSPACE/docs/api/core-agent.v1.openapi.yaml"
