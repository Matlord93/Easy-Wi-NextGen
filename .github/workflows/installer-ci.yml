name: installer-ci

on:
  pull_request:
    paths:
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/installer-ci.yml'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - 'installer/**'
      - 'docs/**'
      - 'README*'
      - 'VERSION'
      - 'templates_audit.md'
      - '.github/workflows/installer-ci.yml'

permissions:
  contents: read

jobs:
  installer:
    name: installer-ci
    runs-on:
      - self-hosted
      - k8s-autoscaling-runner
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Install shellcheck
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            version=0.10.0
            mkdir -p "$HOME/.local/bin" "$RUNNER_TEMP/shellcheck"
            curl -sSfL "https://github.com/koalaman/shellcheck/releases/download/v${version}/shellcheck-v${version}.linux.x86_64.tar.xz" \
              | tar -xJ -C "$RUNNER_TEMP/shellcheck" --strip-components=1
            mv "$RUNNER_TEMP/shellcheck/shellcheck" "$HOME/.local/bin/shellcheck"
            chmod +x "$HOME/.local/bin/shellcheck"
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          shellcheck --version

      - name: Bash syntax check
        run: |
          find installer -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Shellcheck
        run: shellcheck installer/*.sh
