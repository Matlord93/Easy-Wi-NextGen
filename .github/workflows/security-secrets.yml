name: security-secrets

on:
  pull_request:
    paths:
      - '**'
  push:
    branches:
      - main
      - Dev
      - Beta
    paths:
      - '**'

permissions:
  contents: read

jobs:
  gitleaks:
    name: security-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
