name: security-secrets

on:
  pull_request:
    paths:
      - '**'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - '**'

permissions:
  contents: read

jobs:
  gitleaks:
    name: security-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: |
          gitleaks detect --source . --verbose --redact
