name: security-secrets

on:
  pull_request:
    paths:
      - '**'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - '**'

permissions:
  contents: read

jobs:
  gitleaks:
    name: security-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
