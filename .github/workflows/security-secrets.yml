name: security-secrets

on:
  pull_request:
    paths:
      - '**'
  push:
    branches: [ main, Dev, Beta ]
    paths:
      - '**'

permissions:
  contents: read

jobs:
  gitleaks:
    name: security-secrets
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0


      - name: Ensure non-root runner user
        uses: ./.github/actions/ensure-runner-user
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          mkdir -p "$HOME/.local/bin"
          mv gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks git . --verbose --redact
